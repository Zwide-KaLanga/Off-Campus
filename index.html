<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vibe Menu Café</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The dynamic background image container -->
    <div class="bg-container" id="bgContainer"></div>

    <!-- Main Interactive Menu Card -->
    <main class="menu-card">
        <div class="menu-header">
            <span class="est">EST. 2026</span>
            <h1 id="menu-title">The Vibe Menu</h1>
            <p id="menu-subtitle">Customize your ideal casual hangout OFF</p>
            <P>OFF CAMPUS EDITION</P>
            <div class="divider"></div>
        </div>

        <!-- Dynamic Content Area -->
        <div id="content-area">
            <h2 id="section-heading">Step 1: Choose Your Beverage</h2>
            <div class="options-container" id="options-box">
                <!-- Buttons will be generated here by JavaScript -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
